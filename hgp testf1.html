<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ઉપધો અને બઢતી (Promotion) કેલ્ક્યુલેટર</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0F1923;
  --surface: #16232F;
  --card: #1C2E3D;
  --border: #2A3F52;
  --accent-blue: #3B9EFF;
  --accent-gold: #F5A623;
  --accent-green: #2ECC71;
  --accent-red: #E74C3C;
  --text: #EAF2FF;
  --text-muted: #7B96B2;
  --font: 'Noto Sans Gujarati', sans-serif;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.app {
  width: 100%;
  max-width: 600px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
h2 { font-size: 18px; margin-bottom: 20px; color: var(--accent-gold); text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 12px; }
.field { margin-bottom: 16px; }
.promo-group {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
}
.promo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
input, select {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 10px; font-size: 14px; color: var(--text);
  outline: none; font-family: var(--font);
}
input:focus, select:focus { border-color: var(--accent-blue); }
.date-input-container { display: none; width: 60%; }
.date-input-container.active { display: block; }
.calc-btn {
  width: 100%; background: linear-gradient(135deg, #1a6fd4, #0f4fa8);
  border: none; border-radius: 10px; padding: 14px; color: white;
  font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 15px;
}
.calc-btn:hover { opacity: 0.9; }
.result-section { display: none; margin-top: 25px; border-top: 2px solid var(--border); padding-top: 20px; }
.result-section.show { display: block; }
.milestone-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 12px;
}
.m-title { font-size: 14px; font-weight: 700; color: var(--accent-blue); }
.m-date { font-size: 18px; font-weight: 700; color: var(--accent-green); margin: 6px 0; }
.m-date.cancelled { color: var(--accent-red); text-decoration: line-through; }
.m-gr { font-size: 11.5px; color: var(--accent-gold); font-weight: 500; line-height: 1.4; }
</style>
</head>
<body>

<div class="app">
  <h2>ઉચ્ચતર પગાર ધોરણ (ઉપધો) અને બઢતી કેલ્ક્યુલેટર</h2>
  
  <div class="field">
    <label>📅 પ્રથમ નિમણૂક/જોડાયા તારીખ (Joining Date)</label>
    <input type="text" id="joiningDate" placeholder="DD/MM/YYYY (દા.ત. 15/06/1998)">
  </div>

  <div class="field">
    <label>🚫 કુલ બિન-પગારી રજા - LWP (દિવસો)</label>
    <input type="number" id="lwpDays" value="0" min="0">
  </div>

  <!-- Promotion 1 Row -->
  <div class="promo-group">
    <div class="promo-row">
      <div style="width: 35%;">
        <label>🎖️ પ્રથમ બઢતી (1st Promotion)</label>
        <select id="promo1Opt" onchange="togglePromoDate('promo1Opt', 'promo1DateCont')">
          <option value="no">ના (No)</option>
          <option value="yes">હા (Yes)</option>
        </select>
      </div>
      <div class="date-input-container" id="promo1DateCont">
        <label>📅 બઢતી તારીખ (Promotion Date)</label>
        <input type="text" id="promo1Date" placeholder="DD/MM/YYYY">
      </div>
    </div>
  </div>

  <!-- Promotion 2 Row -->
  <div class="promo-group">
    <div class="promo-row">
      <div style="width: 35%;">
        <label>🎖️ બીજી બઢતી (2nd Promotion)</label>
        <select id="promo2Opt" onchange="togglePromoDate('promo2Opt', 'promo2DateCont')">
          <option value="no">ના (No)</option>
          <option value="yes">હા (Yes)</option>
        </select>
      </div>
      <div class="date-input-container" id="promo2DateCont">
        <label>📅 બઢતી તારીખ (Promotion Date)</label>
        <input type="text" id="promo2Date" placeholder="DD/MM/YYYY">
      </div>
    </div>
  </div>

  <!-- Promotion 3 Row -->
  <div class="promo-group">
    <div class="promo-row">
      <div style="width: 35%;">
        <label>🎖️ ત્રીજી બઢતી (3rd Promotion)</label>
        <select id="promo3Opt" onchange="togglePromoDate('promo3Opt', 'promo3DateCont')">
          <option value="no">ના (No)</option>
          <option value="yes">હા (Yes)</option>
        </select>
      </div>
      <div class="date-input-container" id="promo3DateCont">
        <label>📅 બઢતી તારીખ (Promotion Date)</label>
        <input type="text" id="promo3Date" placeholder="DD/MM/YYYY">
      </div>
    </div>
  </div>

  <button class="calc-btn" onclick="calculateComplexUpdhoWithPromo()">સાચી પાત્રતા ગણો</button>

  <div class="result-section" id="resultSection">
    <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px; font-weight: bold;">📊 બઢતી શરતો આધારિત અસલી સમયરેખા પરિણામ:</div>
    <div id="timeline"></div>
  </div>
</div>

<script>
const GR_2007_START = new Date(2007, 6, 2);   // 02/07/2007
const GR_2022_START = new Date(2022, 9, 19);  // 19/10/2022

function togglePromoDate(selectId, containerId) {
  const opt = document.getElementById(selectId).value;
  const cont = document.getElementById(containerId);
  if(opt === 'yes') {
    cont.classList.add('active');
  } else {
    cont.classList.remove('active');
    cont.querySelector('input').value = '';
  }
}

function parseDate(str) {
  if(!str) return null;
  const parts = str.trim().split('/');
  if(parts.length !== 3) return null;
  const d = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10) - 1;
  const y = parseInt(parts[2], 10);
  const date = new Date(y, m, d);
  return (date.getDate() === d && date.getMonth() === m && date.getFullYear() === y) ? date : null;
}

function formatDate(date) {
  if(!date) return '';
  const d = String(date.getDate()).padStart(2, '0');
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const y = date.getFullYear();
  return `${d}/${m}/${y}`;
}

function addYearsAndLWP(baseDate, years, lwpDays) {
  let targetDate = new Date(baseDate.getTime());
  targetDate.setFullYear(targetDate.getFullYear() + years);
  if (lwpDays > 0) targetDate.setDate(targetDate.getDate() + lwpDays);
  return targetDate;
}

function addYearsDirect(baseDate, years) {
  let targetDate = new Date(baseDate.getTime());
  targetDate.setFullYear(targetDate.getFullYear() + years);
  return targetDate;
}

function calculateComplexUpdhoWithPromo() {
  const joinInput = document.getElementById('joiningDate').value;
  const lwpDays = parseInt(document.getElementById('lwpDays').value, 10) || 0;
  const timeline = document.getElementById('timeline');
  const resultSection = document.getElementById('resultSection');

  const joiningDate = parseDate(joinInput);
  if (!joiningDate) {
    alert('કૃપા કરીને સાચી જોડાણ તારીખ દાખલ કરો!');
    return;
  }

  const hasPromo1 = document.getElementById('promo1Opt').value === 'yes';
  const promo1Date = hasPromo1 ? parseDate(document.getElementById('promo1Date').value) : null;
  if(hasPromo1 && !promo1Date) { alert('કૃપા કરીને પ્રથમ બઢતીની સાચી તારીખ લખો!'); return; }

  const hasPromo2 = document.getElementById('promo2Opt').value === 'yes';
  const promo2Date = hasPromo2 ? parseDate(document.getElementById('promo2Date').value) : null;
  if(hasPromo2 && !promo2Date) { alert('કૃપા કરીને બીજી બઢતીની સાચી તારીખ લખો!'); return; }

  const hasPromo3 = document.getElementById('promo3Opt').value === 'yes';
  const promo3Date = hasPromo3 ? parseDate(document.getElementById('promo3Date').value) : null;
  if(hasPromo3 && !promo3Date) { alert('કૃપા કરીને ત્રીજી બઢતીની સાચી તારીખ લખો!'); return; }

  timeline.innerHTML = '';
  let htmlContent = '';
  
  let final1stDate = null;
  let is1stUpdhoCancelled = false;
  let firstUpdhoType = "9_YEARS"; 
  let m1Desc = '';

  // ==========================================
  // PHASE 1: પ્રથમ ઉપધો ગણતરી (1st Milestone)
  // ==========================================
  let check9Years = addYearsAndLWP(joiningDate, 9, lwpDays);
  let baseCalculated1stUpdho = null;

  if (check9Years < GR_2007_START) {
    baseCalculated1stUpdho = check9Years;
    firstUpdhoType = "9_YEARS";
    m1Desc = "૧૯૯૪ ના ઠરાવ મુજબ પ્રથમ ૯ વર્ષ પૂર્ણ થતાં મળવાપાત્ર.";
  } else {
    let check12Years = addYearsAndLWP(joiningDate, 12, lwpDays);
    if (check12Years < GR_2022_START) {
      baseCalculated1stUpdho = check12Years;
      firstUpdhoType = "12_YEARS";
      m1Desc = "૦૨/૦૭/૨૦૦૭ ના ઠરાવ મુજબ પ્રથમ ૧૨ વર્ષ પૂર્ણ થતાં મળવાપાત્ર.";
    } else {
      let check10Years = addYearsAndLWP(joiningDate, 10, lwpDays);
      if (check10Years < GR_2022_START) {
        baseCalculated1stUpdho = new Date(GR_2022_START.getTime());
        firstUpdhoType = "10_YEARS";
        m1Desc = "૧૦ વર્ષ ઠરાવ તારીખ ૧૯/૧૦/૨૦૨૨ પહેલા પૂર્ણ થયેલ હોવાથી ઠરાવ તારીખથી મળવાપાત્ર.";
      } else {
        baseCalculated1stUpdho = check10Years;
        firstUpdhoType = "10_YEARS";
        m1Desc = "૧૯/૧૦/૨૦૨૨ ના નવા ઠરાવ મુજબ ૧૦ વર્ષ પૂર્ણ થતાં મળવાપાત્ર.";
      }
    }
  }

  if (hasPromo1 && promo1Date < baseCalculated1stUpdho) {
    final1stDate = promo1Date;
    is1stUpdhoCancelled = true;
    m1Desc = `⚠️ પ્રથમ બઢતી તારીખ ${formatDate(promo1Date)} ના રોજ મળેલ હોવાથી, પ્રથમ ઉપધો રદ થયેલ છે.`;
  } else {
    final1stDate = baseCalculated1stUpdho;
  }

  htmlContent += `
    <div class="milestone-item">
      <div class="m-title">૧ મું ઉચ્ચતર પગાર ધોરણ (1st Higher Grade)</div>
      <div class="m-date ${is1stUpdhoCancelled ? 'cancelled' : ''}">📅 ${formatDate(baseCalculated1stUpdho)}</div>
      <div class="m-gr">📋 સ્થિતિ: ${m1Desc}</div>
    </div>
  `;

  // ==========================================
  // PHASE 2: બીજા ઉપધો ગણતરી (2nd Milestone)
  // ==========================================
  let baseCalculated2ndUpdho = null;
  let is2ndUpdhoCancelled = false;
  let m2Desc = '';

  if (is1stUpdhoCancelled) {
    let check20Years = addYearsAndLWP(joiningDate, 20, lwpDays);
    let check24Years = addYearsAndLWP(joiningDate, 24, lwpDays);
    if (check24Years < GR_2022_START) {
      baseCalculated2ndUpdho = check24Years;
      m2Desc = "પ્રથમ બઢતી બાદ જૂના નિયમ મુજબ ૨૪ વર્ષ પૂર્ણ થતા મળવાપાત્ર.";
    } else if (check20Years < GR_2022_START && check24Years >= GR_2022_START) {
      baseCalculated2ndUpdho = new Date(GR_2022_START.getTime());
      m2Desc = "૨૦ વર્ષ ઠરાવ પહેલા પૂર્ણ થાય છે અને ૨૪ વર્ષ ઠરાવ પછી હોવાથી ૧૯/૧૦/૨૦૨૨ થી પાત્ર.";
    } else {
      baseCalculated2ndUpdho = check20Years;
      m2Desc = "નવા નિયમ મુજબ નિમણૂકથી ૨૦ વર્ષ પૂર્ણ થવાની તારીખે પાત્ર.";
    }
  } 
  else if (firstUpdhoType === "9_YEARS") {
    let check9Plus15 = addYearsDirect(final1stDate, 15);
    if (check9Plus15 < GR_2022_START) {
      baseCalculated2ndUpdho = check9Plus15;
      m2Desc = "પ્રથમ ઉપધો (૯ વર્ષ) માં વધુ ૧૫ વર્ષ ઉમેરતા (કુલ ૨૪ વર્ષે) મળવાપાત્ર.";
    } else {
      let check20Years = addYearsAndLWP(joiningDate, 20, lwpDays);
      if (check20Years < GR_2022_START) {
        baseCalculated2ndUpdho = new Date(GR_2022_START.getTime());
        m2Desc = "૨૦ વર્ષ ૧૯/૧૦/૨૦૨૨ પહેલા પુરા થાય છે પરંતુ જૂના ૨૪ વર્ષ ઠરાવ પછી હોવાથી ૧૯/૧૦/૨૦૨૨ થી મળવાપાત્ર.";
      } else {
        baseCalculated2ndUpdho = check20Years;
        m2Desc = "નવા ઠરાવ મુજબ પ્રથમ નિમણૂકથી ૨૦ વર્ષ પૂર્ણ થવાની તારીખે મળવાપાત્ર.";
      }
    }
  } 
  else if (firstUpdhoType === "12_YEARS") {
    let check12Plus8 = addYearsDirect(final1stDate, 8);
    let checkOriginal24 = addYearsAndLWP(joiningDate, 24, lwpDays);

    if (checkOriginal24 < GR_2022_START) {
      baseCalculated2ndUpdho = checkOriginal24;
      m2Desc = "જૂના નિયમ મુજબ ૨૪ વર્ષ પૂર્ણ થતા મળવાપાત્ર.";
    } else if (check12Plus8 >= GR_2022_START) {
      baseCalculated2ndUpdho = check12Plus8;
      m2Desc = "૧૨ વર્ષના ઉપધોમાં વધુ ૮ વર્ષ ઉમેરતા (કુલ ૨૦ વર્ષે) મળવાપાત્ર.";
    } else if (check12Plus8 < GR_2022_START && checkOriginal24 >= GR_2022_START) {
      baseCalculated2ndUpdho = new Date(GR_2022_START.getTime());
      m2Desc = "૨૦ વર્ષ વહેલા પુરા થાય છે અને ૨૪ વર્ષ ઠરાવ પછી હોવાથી નિયમ અનુસાર ૧૯/૧૦/૨૦૨૨ થી મળવાપાત્ર.";
    }
  } else {
    baseCalculated2ndUpdho = addYearsAndLWP(joiningDate, 20, lwpDays);
    m2Desc = "નવા નિયમ મુજબ પ્રથમ નિમણૂકથી ૨૦ વર્ષ પૂર્ણ થતા મળવાપાત્ર.";
  }

  // Check Condition: If second promotion occurs before 2nd Updho
  if (hasPromo2 && promo2Date < baseCalculated2ndUpdho) {
    is2ndUpdhoCancelled = true;
    m2Desc = `⚠️ બીજી બઢતી તારીખ ${formatDate(promo2Date)} ના રોજ મળેલ હોવાથી, ૨ જું ઉપધો રદ થયેલ છે.`;
  }

  htmlContent += `
    <div class="milestone-item">
      <div class="m-title">૨ જું ઉચ્ચતર પગાર ધોરણ (2nd Higher Grade)</div>
      <div class="m-date ${is2ndUpdhoCancelled ? 'cancelled' : ''}">📅 ${formatDate(baseCalculated2ndUpdho)}</div>
      <div class="m-gr">📋 સ્થિતિ: ${m2Desc}</div>
    </div>
  `;

  // ==========================================
  // PHASE 3: ત્રીજા ઉપધો ગણતરી (3rd Milestone)
  // ==========================================
  let baseCalculated3rdUpdho = null;
  let is3rdUpdhoCancelled = false;
  let m3Desc = '';

  // NEW CONDITION CHECK: If 2nd promotion happened before 2nd Updho -> Add 10 Years to 2nd Promotion
  if (hasPromo2 && is2ndUpdhoCancelled) {
    let checkPromo2Plus10 = addYearsDirect(promo2Date, 10);
    
    if (checkPromo2Plus10 < GR_2022_START) {
      baseCalculated3rdUpdho = new Date(GR_2022_START.getTime());
      m3Desc = "બીજી બઢતીના ૧૦ વર્ષ ઠરાવ પહેલા પૂર્ણ થતા હોવાથી ૧૯/૧૦/૨૦૨૨ થી મળવાપાત્ર.";
    } else {
      baseCalculated3rdUpdho = checkPromo2Plus10;
      m3Desc = "નિયમ મુજબ બીજી બઢતી તારીખમાં ૧૦ વર્ષ ઉમેરતા મળવાપાત્ર તારીખ.";
    }
  } else {
    // Standard calculation: 30 Years from joining date
    let check30Years = addYearsAndLWP(joiningDate, 30, lwpDays);
    if (check30Years < GR_2022_START) {
      baseCalculated3rdUpdho = new Date(GR_2022_START.getTime());
      m3Desc = "૩૦ વર્ષની સેવા ઠરાવ પહેલા પૂર્ણ થયેલ હોવાથી ૧૯/૧૦/૨૦૨૨ થી મળવાપાત્ર.";
    } else {
      baseCalculated3rdUpdho = check30Years;
      m3Desc = "પ્રથમ નિમણૂકથી ૩૦ વર્ષ પૂર્ણ થવાની સાચી તારીખે મળવાપાત્ર.";
    }
  }

  // Condition check: If third promotion occurs BEFORE the third Updho date -> NO third Updho given
  if (hasPromo3 && promo3Date < baseCalculated3rdUpdho) {
    is3rdUpdhoCancelled = true;
    m3Desc = `⛔ ત્રીજી બઢતી તારીખ ${formatDate(promo3Date)} ના રોજ મળેલ હોવાથી નિયમ મુજબ ૩ જું ઉપધો મળવાપાત્ર નથી.`;
  }

  htmlContent += `
    <div class="milestone-item">
      <div class="m-title">૩ જું ઉચ્ચતર પગાર ધોરણ (3rd Higher Grade)</div>
      <div class="m-date ${is3rdUpdhoCancelled ? 'cancelled' : ''}">📅 ${is3rdUpdhoCancelled ? 'મળવાપાત્ર નથી' : formatDate(baseCalculated3rdUpdho)}</div>
      <div class="m-gr">📋 સ્થિતિ: ${m3Desc}</div>
    </div>
  `;

  timeline.innerHTML = htmlContent;
  resultSection.classList.add('show');
}
